<header class="profile-header">
    {{ with .Params.profileImage }}
    <img src="{{ . | relURL }}" alt="Eugene Bogorad" class="profile-pic">
    {{ end }}
    <div class="profile-text">
        <h1>{{ .Params.name }}</h1>
        <h2 class="subtitle">{{ .Params.role }}</h2>
        <div class="bio">{{ .Content }}</div>
    </div>
</header>
