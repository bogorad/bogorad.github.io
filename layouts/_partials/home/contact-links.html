<aside class="right-sidebar">
    <div class="contact-links">
        {{ range site.Data.contacts.items }}
            <a href="{{ .href | safeURL }}" title="{{ .title }}"{{ if .external }} target="_blank" rel="noopener noreferrer"{{ end }}>
                {{ partial "home/contact-icon.html" . }}
            </a>
        {{ end }}
    </div>
</aside>
